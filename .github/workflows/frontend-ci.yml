name: Frontend CI - MindCare

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test_frontend:
    name: Test & Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: |
          if [ -f .eslintrc.js ] || [ -f .eslintrc.json ]; then
            npm run lint
          else
            echo "No ESLint config found — skipping lint."
          fi

      - name: Run tests
        run: |
          if npm run | grep -q "test"; then
            npm test -- --watchAll=false
          else
            echo "No test script — skipping tests."
          fi

      - name: Build
        run: npm run build
